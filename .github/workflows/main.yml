name: Build

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-nds:
    name: Nintendo DS (BlocksDS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build NDS ROM
        run: |
          docker build -t chocolate-doom-ds-sdk .
          docker run --rm -v ${{ github.workspace }}:/work -w /work chocolate-doom-ds-sdk \
            make -f Makefile.arm9

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chocolate-doom-ds-${{ github.sha }}
          path: chocolate_doom_ds.nds

  release:
    name: Release
    needs: build-nds
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: chocolate-doom-ds-${{ github.sha }}

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: Chocolate Doom DS ${{ github.ref_name }}
          body: |
            Chocolate Doom DS ${{ github.ref_name }}

            Flash `chocolate_doom_ds.nds` to your SD card alongside `/doom/doom1.wad`.
          artifacts: chocolate_doom_ds.nds
          draft: false
